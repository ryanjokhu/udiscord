name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  core-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          show-progress: false
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'
      - name: Run core tests
        shell: bash
        run: |
          set +e
          dotnet test tests/uDiscord.Core.Tests/uDiscord.Core.Tests.csproj -c Release --verbosity minimal > test-output.txt 2>&1
          code=$?
          cat test-output.txt
          echo "$code" > test-exit-code.txt
          exit 0
      - name: Upload test diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: core-test-diagnostics
          path: |
            test-output.txt
            test-exit-code.txt
      - name: Reject failed tests
        shell: bash
        run: |
          code="$(cat test-exit-code.txt)"
          if [ "$code" != "0" ]; then
            echo "Core tests failed with exit code $code."
            exit "$code"
          fi
      - name: Reject release placeholders
        shell: bash
        run: |
          if grep -RInE 'TODO|FIXME|NotImplementedException' src tests; then
            echo 'Release placeholder detected.'
            exit 1
          fi
