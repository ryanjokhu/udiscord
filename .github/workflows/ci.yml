name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  core-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          show-progress: false
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'
      - name: Run core tests
        run: dotnet test tests/uDiscord.Core.Tests/uDiscord.Core.Tests.csproj -c Release --verbosity minimal
      - name: Reject release placeholders
        shell: bash
        run: |
          if grep -RInE 'TODO|FIXME|NotImplementedException' src tests; then
            echo 'Release placeholder detected.'
            exit 1
          fi
