name: Bootstrap implementation

on:
  push:
    branches:
      - implementation/customer-ready-v1
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  bootstrap:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: implementation/customer-ready-v1
          fetch-depth: 0

      - name: Expand verified implementation payload
        shell: bash
        run: |
          cat .github/bootstrap-payload/part-*.txt > /tmp/udiscord-payload.b64
          test "$(wc -c < /tmp/udiscord-payload.b64)" = "66632"
          echo "46efbb2c85871e32ca5c2d5204cea90f7b7b154f790ada4f2fd5a033d5ae4ee1  /tmp/udiscord-payload.b64" | sha256sum -c -
          base64 --decode /tmp/udiscord-payload.b64 > /tmp/udiscord-payload.tar.gz
          echo "d51bad5404ae115a604b1845545bd2892236330ca36e2cf1de93982022144147  /tmp/udiscord-payload.tar.gz" | sha256sum -c -
          tar -xzf /tmp/udiscord-payload.tar.gz -C .
          rm -rf .github/bootstrap-payload
          rm -f .github/workflows/bootstrap-implementation.yml

      - name: Commit implementation
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "feat: implement customer-ready embedded Discord bridge"
          git push origin HEAD:implementation/customer-ready-v1
