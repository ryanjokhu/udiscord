name: Export portable C# toolchain

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  export:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'
      - name: Build portable compiler bundle
        shell: bash
        run: |
          set -euo pipefail
          ROOT="$(dirname "$(readlink -f "$(command -v dotnet)")")"
          SDK_VERSION="$(dotnet --version)"
          RUNTIME_VERSION="$(dotnet --list-runtimes | awk '/Microsoft.NETCore.App/ {print $2}' | sort -V | tail -1)"
          OUT=/tmp/portable-csharp-toolchain
          mkdir -p "$OUT/sdk/$SDK_VERSION" "$OUT/shared/Microsoft.NETCore.App" "$OUT/host"
          cp "$ROOT/dotnet" "$OUT/dotnet"
          cp -a "$ROOT/host/." "$OUT/host/"
          cp -a "$ROOT/shared/Microsoft.NETCore.App/$RUNTIME_VERSION" "$OUT/shared/Microsoft.NETCore.App/"
          cp -a "$ROOT/sdk/$SDK_VERSION/Roslyn" "$OUT/sdk/$SDK_VERSION/"
          printf '%s\n' "$SDK_VERSION" > "$OUT/sdk-version.txt"
          printf '%s\n' "$RUNTIME_VERSION" > "$OUT/runtime-version.txt"

          mkdir -p /tmp/refproj
          cd /tmp/refproj
          dotnet new classlib --framework net8.0 --no-restore
          dotnet add package Microsoft.NETFramework.ReferenceAssemblies.net48 --version 1.0.3
          dotnet restore
          REF="$HOME/.nuget/packages/microsoft.netframework.referenceassemblies.net48/1.0.3/build/.NETFramework/v4.8"
          test -d "$REF"
          cp -a "$REF" "$OUT/net48-reference-assemblies"
          chmod +x "$OUT/dotnet"
      - uses: actions/upload-artifact@v4
        with:
          name: portable-csharp-toolchain
          path: /tmp/portable-csharp-toolchain
          retention-days: 1
